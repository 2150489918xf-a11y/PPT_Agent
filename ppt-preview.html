<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT 课件预览</title>
  <style>
    :root {
      --ink: #121615;
      --muted: #7b847d;
      --line: rgba(255, 255, 255, 0.74);
      --tile: rgba(253, 255, 251, 0.56);
      --panel: rgba(249, 252, 245, 0.58);
      --lime: #c4ff38;
      --green: #17663a;
      --dark: #252928;
      --shadow: 0 22px 52px rgba(43, 58, 45, 0.13);
      --soft-shadow: 0 16px 34px rgba(43, 58, 45, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --page-max: 1520px;
      
      /* Map original variables for compatibility */
      --bg-primary: #f7f9ef;
      --bg-secondary: rgba(255, 255, 255, 0.5);
      --bg-elevated: rgba(255, 255, 255, 0.85);
      --text-primary: #121615;
      --text-secondary: #475569;
      --text-muted: #7b847d;
      --border-default: rgba(255, 255, 255, 0.65);
      --border-hover: rgba(255, 255, 255, 0.9);
      --accent-primary: #17663a;
      --accent-hover: #0e3f24;
      --accent-glow: rgba(23, 102, 58, 0.12);
      --accent-green: #17663a;
      --accent-yellow: #f59e0b;
      --font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 18px;
      --text-xl: 20px;
      --font-medium: 500;
      --font-semibold: 600;
      --font-bold: 700;
      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.625;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-sm: 0 4px 10px rgba(43, 58, 45, 0.04);
      --shadow-md: 0 12px 28px rgba(43, 58, 45, 0.08);
      --duration-fast: 150ms;
      --duration-normal: 200ms;
      --ease-default: cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      color: var(--text-primary);
      background:
        radial-gradient(circle at 8% 50%, rgba(205, 255, 72, 0.26), transparent 20%),
        radial-gradient(circle at 66% 14%, rgba(177, 196, 176, 0.28), transparent 30%),
        radial-gradient(circle at 86% 92%, rgba(167, 188, 167, 0.22), transparent 24%),
        linear-gradient(108deg, #f7f9ef 0%, #edf4e7 44%, #e1eadc 100%);
      font-family: var(--font-family);
      line-height: var(--leading-normal);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
      opacity: 0.35;
      z-index: 0;
    }
    button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    textarea { font: inherit; border: 0; background: none; color: inherit; resize: none; }
    input { font: inherit; border: 0; background: none; color: inherit; }

    /* Layout */
    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      height: 100vh;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.65);
    }
    .topbar-left, .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-back {
      display: inline-flex; align-items: center; gap: 6px;
      height: 34px; padding: 0 12px; border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #475569;
      font-size: var(--text-xs); font-weight: var(--font-bold);
      transition: all var(--duration-fast) var(--ease-default);
    }
    .topbar-back:hover {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.9);
      color: #121615;
    }
    .topbar-title { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .topbar-title h1 {
      overflow: hidden; font-size: 15px; font-weight: 800;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .topbar-title span { color: var(--text-muted); font-size: 12px; font-weight: 700; white-space: nowrap; }
    .btn {
      height: 34px; padding: 0 14px; border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #475569;
      font-size: var(--text-xs); font-weight: var(--font-bold);
      transition: all var(--duration-fast) var(--ease-default);
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.9);
      color: #121615;
      transform: translateY(-1px);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: var(--lime);
      color: #0d120e;
      border: none;
      box-shadow: 0 10px 20px rgba(188, 255, 52, 0.22);
      font-weight: 950;
    }
    .btn-primary:hover {
      background: var(--lime);
      color: #0d120e;
      transform: translateY(-2px);
      filter: brightness(1.02);
      box-shadow: 0 14px 28px rgba(188, 255, 52, 0.32);
    }

    /* Body */
    .editor-body {
      display: grid; grid-template-columns: 248px 1fr 4px 340px;
      min-height: 0; overflow: hidden;
    }

    /* Resize Handle */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      position: relative;
      z-index: 10;
      background: transparent;
      transition: background 0.2s;
    }
    .resize-handle:hover, .resize-handle.active {
      background: rgba(23, 102, 58, 0.2);
    }

    /* Left: Slide List */
    .left-panel {
      display: grid; grid-template-rows: auto 1fr auto;
      background: rgba(249, 252, 245, 0.58);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-right: 1px solid rgba(255, 255, 255, 0.65);
      overflow: hidden;
    }
    .slides-head {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 14px; border-bottom: 1px solid var(--border-default);
    }
    .slides-head strong { font-size: 13px; font-weight: 800; }
    .slides-head span { color: var(--text-muted); font-size: 11px; font-weight: 700; }
    .slide-list {
      display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto; padding: 12px 14px;
    }
    .slide-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9; padding: 0;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.65);
      cursor: pointer; overflow: hidden;
      text-align: left; transition: all var(--duration-fast) var(--ease-default);
      flex-shrink: 0;
    }
    .slide-thumb:hover {
      border-color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow-sm); transform: translateY(-1px);
    }
    .slide-thumb.active {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(23, 102, 58, 0.15);
    }
    .slide-thumb-inner {
      display: grid; gap: 4px; padding: 10px; height: 100%; align-content: start;
    }
    .slide-thumb-kicker {
      font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--accent-primary);
    }
    .slide-thumb-title {
      font-size: 11px; font-weight: 800; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .slide-thumb-lines {
      display: grid; gap: 2px; margin-top: auto;
    }
    .slide-thumb-line {
      height: 3px; border-radius: 2px; background: rgba(255, 255, 255, 0.5);
    }
    .slide-thumb-line.w75 { width: 75%; }
    .slide-thumb-line.w50 { width: 50%; }
    .slide-thumb-line.w60 { width: 60%; }
    .slides-footer {
      padding: 12px 14px; border-top: 1px solid var(--border-default);
    }
    .slides-footer button {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; height: 38px;
      border: 2px dashed var(--border-default); border-radius: 12px;
      background: transparent; color: var(--text-muted);
      font-size: var(--text-xs); font-weight: 800;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .slides-footer button:hover {
      border-color: var(--accent-primary); background: var(--accent-glow); color: var(--text-primary);
    }

    /* Center: Canvas Workspace */
    .main-panel {
      min-width: 0; min-height: 0; overflow: hidden;
      background: transparent;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .canvas-card {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .canvas-area {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 24px;
      min-height: 0;
      position: relative;
    }
    .slide-canvas {
      aspect-ratio: 16/9;
      width: min(100%, calc((100vh - 230px) * 16 / 9));
      max-height: calc(100% - 10px);
      border-radius: 20px;
      box-shadow: 0 24px 58px rgba(18, 38, 92, 0.16);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: background 0.3s;
    }
    .slide-canvas-inner {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Cover Slide Styling (牛顿第二定律专属封面) */
    .cover-theme .slide-canvas-inner {
      padding: 40px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .deco-circle {
      position: absolute;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.05);
    }
    .circle-f { top: 40px; left: 40px; }
    .circle-m { top: 40px; right: 40px; }
    .circle-a { bottom: 40px; left: 40px; }
    .deco-arrow {
      position: absolute;
      bottom: 44px;
      right: 40px;
      width: 32px;
      height: 32px;
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .deco-arrow svg {
      width: 100%;
      height: 100%;
      stroke-width: 2.5;
    }
    .cover-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .cover-content h2 {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #fff !important;
      margin: 0;
      line-height: 1.15;
    }
    .cover-content .subtitle {
      font-size: 17px;
      color: rgba(255, 255, 255, 0.7);
      margin: 0 0 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .cover-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 11px;
    }
    .meta-item span {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 800;
    }
    .meta-item strong {
      color: #fff;
      font-size: 13px;
      font-weight: 950;
    }
    .meta-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.18);
    }

    /* Content Slide Theme (普通页面排版) */
    .content-theme .slide-canvas-inner {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 44px 52px;
      text-align: left;
    }
    .content-theme .slide-canvas-kicker {
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--lime);
      margin-bottom: 8px;
    }
    .content-theme h2 {
      font-size: 30px;
      font-weight: 900;
      color: #fff !important;
      margin: 0 0 10px;
      line-height: 1.25;
    }
    .content-theme .slide-desc {
      font-size: 14.5px;
      color: rgba(255, 255, 255, 0.8);
      margin: 0 0 20px;
      line-height: 1.6;
    }
    .content-theme .slide-canvas-bullets {
      display: grid;
      gap: 10px;
      width: 100%;
      margin-top: 4px;
    }
    .content-theme .slide-canvas-bullet {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.5;
    }
    .content-theme .slide-canvas-bullet i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lime);
      flex-shrink: 0;
    }

    /* Canvas Controls (底部横向操作条) */
    .canvas-controls {
      height: 72px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.8);
      border-top: 1px solid rgba(18, 22, 21, 0.05);
    }
    .page-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(18, 22, 21, 0.08);
      padding: 4px 10px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
    }
    .nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #475569;
      transition: all 0.2s;
    }
    .nav-btn:hover {
      background: rgba(18, 22, 21, 0.06);
      color: #121615;
    }
    .nav-btn svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.7;
    }
    .page-indicator {
      font-size: 13.5px;
      font-weight: 850;
      color: #121615;
      min-width: 54px;
      text-align: center;
    }
    .export-ppt-btn {
      height: 42px;
      padding: 0 18px;
      border-radius: 12px;
      background: var(--lime);
      color: #0d120e;
      font-weight: 950;
      font-size: 12.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      box-shadow: 0 10px 22px rgba(188, 255, 52, 0.22);
      transition: all 0.2s;
      cursor: pointer;
    }
    .export-ppt-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(188, 255, 52, 0.32);
    }
    .export-ppt-btn svg {
      width: 15px;
      height: 15px;
      stroke-width: 3;
      color: #0d120e;
    }

    .canvas-toolbar button:hover { background: rgba(255, 255, 255, 0.85); color: #121615; }

    /* Right: AI Panel */
    .ai-panel {
      display: grid; grid-template-rows: auto auto 1fr auto;
      background: rgba(249, 252, 245, 0.58);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255, 255, 255, 0.65);
      overflow: hidden;
    }
    .ai-head {
      display: grid; gap: 6px; padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border-default);
    }
    .ai-head .kicker {
      font-size: 11px; font-weight: 900; text-transform: uppercase;
      color: #17663a;
    }
    .ai-head h2 { font-size: 20px; font-weight: 900; line-height: 1.2; }
    .ai-head p { margin: 0; color: var(--text-muted); font-size: 12px; line-height: 1.6; }

    .ai-context {
      display: grid; gap: 8px; margin: 12px 18px 0; padding: 12px;
      border: 1px solid var(--border-default); border-radius: 12px;
      background: var(--bg-secondary);
    }
    .ai-context-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .ai-context-row span { color: var(--text-muted); font-size: 11px; font-weight: 800; }
    .ai-context-row strong { font-size: 12px; font-weight: 900; text-align: right; }
    .ai-context p { margin: 0; color: var(--text-muted); font-size: 12px; line-height: 1.55; }
    .ai-context button {
      justify-self: start; height: 28px; padding: 0 10px;
      border: 1px solid var(--border-default); border-radius: var(--radius-full);
      background: var(--bg-secondary); color: var(--text-muted);
      font-size: 11px; font-weight: 800;
    }
    .ai-context button:hover { background: var(--bg-elevated); color: var(--text-primary); }

    .ai-messages {
      display: grid; align-content: start; gap: 16px;
      overflow-y: auto; padding: 18px;
    }
    .ai-msg {
      display: grid; justify-self: start; max-width: 88%;
      padding: 14px 20px; border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px; background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(43, 58, 45, 0.05);
    }
    .ai-msg.user {
      justify-self: end;
      border-radius: 20px;
      background: rgba(17, 20, 22, 0.82);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 28px rgba(17, 20, 22, 0.18);
    }
    .ai-msg.user p { color: #ffffff; }
    .ai-msg p { margin: 0; color: #2c332e; font-size: 14px; line-height: 1.6; overflow-wrap: anywhere; }

    .ai-empty {
      display: grid; gap: 10px; padding: 18px;
      border: 1px solid var(--border-default); border-radius: 16px;
      background: var(--bg-secondary);
    }
    .ai-empty-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center;
      background: var(--accent-glow); color: var(--accent-primary);
      font-size: 18px;
    }
    .ai-empty strong { font-size: 14px; font-weight: 900; }
    .ai-empty p { margin: 0; color: var(--text-muted); font-size: 12px; line-height: 1.6; }
    .ai-empty-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .ai-empty-chips button {
      height: 30px; padding: 0 11px; border-radius: var(--radius-full);
      border: 1px solid var(--border-default); background: var(--bg-secondary);
      color: var(--text-muted); font-size: 12px;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .ai-empty-chips button:hover { background: var(--bg-elevated); color: var(--text-primary); }

    .ai-composer {
      display: grid; gap: 10px; padding: 14px 18px 18px;
      border-top: 1px solid var(--border-default);
    }
    .ai-composer textarea {
      min-height: 84px; max-height: 140px; padding: 16px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.85);
      color: #121615;
      font-size: 13.5px; line-height: 1.6;
    }
    .ai-composer textarea:focus { border-color: var(--accent-primary); outline: none; background: rgba(255, 255, 255, 0.7); }
    .ai-composer-actions {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    }
    .ai-composer-actions span { margin-right: auto; color: var(--text-muted); font-size: 12px; }
    .ai-composer-actions .btn-send {
      height: 34px; padding: 0 14px; border-radius: var(--radius-full);
      background: var(--lime);
      color: #0d120e;
      border: none;
      box-shadow: 0 10px 20px rgba(188, 255, 52, 0.22);
      font-size: 12px;
      font-weight: 950;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .ai-composer-actions .btn-send:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
      box-shadow: 0 14px 28px rgba(188, 255, 52, 0.32);
    }
    .ai-composer-actions .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(18, 22, 21, 0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(18, 22, 21, 0.25); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-back" onclick="location.href='workspace.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          返回
        </button>
        <div class="topbar-title">
          <h1 id="topbar-subject">牛顿第二定律</h1>
          <span id="topbar-meta">PPT 课件 · 14 页</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="alert('预览教案')">预览教案</button>
        <button class="btn" id="btn-export" onclick="alert('导出 PPT')">导出</button>
        <button class="btn-primary btn" onclick="alert('重新生成')">重新生成</button>
      </div>
    </header>

    <div class="editor-body">
      <!-- Left: Slide List -->
      <aside class="left-panel">
        <header class="slides-head">
          <strong>幻灯片</strong>
          <span id="slide-count">14 页</span>
        </header>
        <section class="slide-list" id="slide-list"></section>
        <footer class="slides-footer">
          <button onclick="alert('AI 生成新页面')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            AI 生成新页面
          </button>
        </footer>
      </aside>

      <!-- Center: Canvas Workspace -->
      <main class="main-panel">
        <div class="canvas-card">
          <div class="canvas-area">
            <div class="slide-canvas" id="slide-canvas">
              <div class="slide-canvas-inner" id="canvas-inner"></div>
            </div>
          </div>
          <footer class="canvas-controls">
            <div class="page-nav">
              <button class="nav-btn" onclick="prevSlide()" title="上一页">
                <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <span class="page-indicator"><span id="current-page-num">1</span> / <span id="total-page-num">14</span></span>
              <button class="nav-btn" onclick="nextSlide()" title="下一页">
                <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
            <button class="export-ppt-btn" onclick="alert('导出 PPT')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              导出 PPT
            </button>
          </footer>
        </div>
      </main>

      <!-- Resize Handle -->
      <div class="resize-handle" id="resize-handle"></div>

      <!-- Right: AI Panel -->
      <aside class="ai-panel">
        <header class="ai-head">
          <span class="kicker">AI Copilot</span>
          <h2>PPT 修改</h2>
          <p id="ai-scope">当前页 · 第 1 页</p>
        </header>
        <section class="ai-context" id="ai-context">
          <div class="ai-context-row">
            <span>当前页</span>
            <strong id="ctx-slide">第 1 页 · 封面</strong>
          </div>
          <div class="ai-context-row">
            <span>选中元素</span>
            <strong id="ctx-element">未选择，默认作用当前页</strong>
          </div>
          <p id="ctx-desc">没有选中具体元素时，AI 默认作用于当前页。</p>
        </section>
        <section class="ai-messages" id="ai-messages"></section>
        <form class="ai-composer" id="ai-form">
          <textarea id="ai-input" rows="3" placeholder="描述怎么修改当前页，或新增一页..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiMessage();}"></textarea>
          <div class="ai-composer-actions">
            <span id="ai-char-count">Enter 发送</span>
            <button class="btn-send" type="submit">发送</button>
          </div>
        </form>
      </aside>
    </div>
  </div>

  <script>
    const slides = [
      {
        id: 'cover', type: '封面', title: '牛顿第二定律',
        subtitle: "Newton's Second Law", grade: '初二物理', duration: '45分钟',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: []
      },
      {
        id: 'toc', type: '目录', title: '课堂流程设计',
        content: '本节课将围绕以下四个核心步骤展开定量探究。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['课前导入：物体的加速度与哪些因素有关？', '科学探究：探究加速度与力、质量的关系（控制变量法）', '定律得出：牛顿第二定律公式 F=ma 及力的单位定义', '知识巩固：三大物理特性解析与随堂速测']
      },
      {
        id: 'intro', type: '导入', title: '生活启发：小车受力与运动状态',
        content: '思考：要让静止的小车跑得更快，我们需要怎么做？',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['用力推小车，推力越大，小车速度改变得越快', '同样的推力，推空车和推满载的车，哪个更容易起步？', '日常结论：加速度的大小可能与“力”和“质量”都有关']
      },
      {
        id: 'method', type: '探究', title: '科学方法：控制变量法',
        content: '由于加速度同时受力与质量两个物理量的影响，必须使用控制变量法。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['步骤 1：保持小车质量 m 不变，探究加速度 a 与拉力 F 的关系', '步骤 2：保持拉力 F 不变，探究加速度 a 与质量 m 的关系', '总结数据，得出三者之间的数学函数模型']
      },
      {
        id: 'exp1', type: '实验', title: '实验探究一：a 与 F 的关系',
        content: '固定小车质量 m，改变吊盘中砝码的质量（即改变小车受到的拉力 F）进行实验。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['记录多组拉力 F 与对应的加速度 a 的数值', '在坐标系中绘制 a-F 图像，图像特征为一条过原点的倾斜直线', '实验结论：在物体质量一定时，加速度与受到的合外力成正比']
      },
      {
        id: 'exp2', type: '实验', title: '实验探究二：a 与 m 的关系',
        content: '固定拉力 F，通过在小车上增加砝码来改变小车的总质量 m 再次进行实验。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['记录多组质量 m 与对应的加速度 a 的数值', '绘制 a-m 图像（双曲线）和 a-(1/m) 图像（直线）', '实验结论：在拉力一定时，物体的加速度与它的质量成反比']
      },
      {
        id: 'law', type: '定理', title: '牛顿第二定律得出',
        content: '结合两次实验结论，我们可以得出加速度、力、质量三者的定量关系。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['加速度 a 与作用力 F 成正比，与质量 m 成反比', '数学表达式：a ∝ F / m，即 F ∝ ma', '公式表示：F = k·ma（在国际单位制中比例系数 k = 1）']
      },
      {
        id: 'formula', type: '公式', title: '核心公式：F = ma',
        content: '这是经典力学中最核心的方程之一，建立了力与运动的直接桥梁。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['F 代表物体所受的合外力（单位：牛顿 N）', 'm 代表物体的质量（单位：千克 kg）', 'a 代表物体的加速度（单位：米每二次方秒 m/s²）']
      },
      {
        id: 'unit', type: '解析', title: '力的单位“牛顿”的定义',
        content: '为什么公式中比例系数 k 可以等于 1？这源于对力的单位的科学定义。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['定义：使质量为 1 kg 的物体产生 1 m/s² 加速度的力，定义为 1 N', '即：1 N = 1 kg·m/s²', '因为单位制的合理统一，使得核心公式可以最简化地写成 F = ma']
      },
      {
        id: 'feature', type: '特性', title: '牛顿第二定律的三大特性',
        content: '深入理解公式时需要注意的物理学内涵。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['瞬时性：加速度 a 与合外力 F 瞬时对应，力变加速度立即变', '矢量性：加速度 a 的方向始终与合外力 F 的方向相同', '同一性：a、F、m 必须对应同一个研究对象']
      },
      {
        id: 'example1', type: '例题', title: '基础计算例题精讲',
        content: '例题：一个质量为 2 kg 的物体，受到 6 N 的水平拉力，求物体的加速度。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['已知条件：m = 2 kg, F = 6 N', '根据公式：a = F / m', '代入计算：a = 6 N / 2 kg = 3 m/s²', '答：物体的加速度为 3 m/s²']
      },
      {
        id: 'example2', type: '应用', title: '综合应用：运动与力的综合',
        content: '例题：静止在水平面上的滑块，受 10N 水平拉力开始运动，摩擦力为 2N，求其运动状态。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['第一步：求合外力 F_合 = F_拉 - f = 10N - 2N = 8N', '第二步：根据 m 求加速度 a = F_合 / m', '第三步：结合运动学公式，求任意时刻的速度和位移']
      },
      {
        id: 'quiz', type: '练习', title: '随堂速测：概念理解',
        content: '请快速判断以下物理学说法的对错。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['1. 物体只有在受力时才会有加速度（对）', '2. 物体速度越大，所受到的力就越大（错，力改变速度而非维持速度）', '3. 惯性越大的物体，其加速度一定越小（错，还要看合外力大小）']
      },
      {
        id: 'summary', type: '总结', title: '本节课要点回顾',
        content: '今天我们共同探究并得出了物理学中极其重要的牛顿第二定律。',
        bg: 'linear-gradient(135deg, #1e52d6 0%, #153fa8 100%)',
        bullets: ['核心公式：F = ma，深刻反映了力是产生加速度的唯一根源', '物理学研究方法：控制变量法与图像分析法', '应用意义：利用已知受力求运动，或利用已知运动求受力']
      }
    ];

    let selectedIndex = 0;
    const aiMessages = [];

    function renderSlideList() {
      const list = document.getElementById('slide-list');
      list.innerHTML = slides.map((s, i) => `
        <button class="slide-thumb ${i === selectedIndex ? 'active' : ''}" onclick="selectSlide(${i})">
          <div class="slide-thumb-inner" style="background: ${s.bg};">
            <span class="slide-thumb-kicker">${s.type}</span>
            <span class="slide-thumb-title">${s.title}</span>
            <div class="slide-thumb-lines">
              <div class="slide-thumb-line w75"></div>
              <div class="slide-thumb-line w50"></div>
              <div class="slide-thumb-line w60"></div>
            </div>
          </div>
        </button>
      `).join('');
      document.getElementById('slide-count').textContent = `${slides.length} 页`;
      document.getElementById('topbar-meta').textContent = `PPT 课件 · ${slides.length} 页`;
      
      // 更新控制条中的页码
      const currentEl = document.getElementById('current-page-num');
      const totalEl = document.getElementById('total-page-num');
      if (currentEl) currentEl.textContent = selectedIndex + 1;
      if (totalEl) totalEl.textContent = slides.length;
    }

    function renderCanvas() {
      const s = slides[selectedIndex];
      if (!s) return;
      const canvas = document.getElementById('slide-canvas');
      const inner = document.getElementById('canvas-inner');
      canvas.style.background = s.bg;
      
      if (s.type === '封面') {
        canvas.className = "slide-canvas cover-theme";
        inner.innerHTML = `
          <div class="deco-circle circle-f">F</div>
          <div class="deco-circle circle-m">m</div>
          <div class="deco-circle circle-a">a</div>
          <div class="deco-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
          <div class="cover-content">
            <h2>${s.title}</h2>
            <p class="subtitle">${s.subtitle || "Newton's Second Law"}</p>
            <div class="cover-meta">
              <div class="meta-item"><span>年级</span><strong>${s.grade || "初二物理"}</strong></div>
              <div class="meta-divider"></div>
              <div class="meta-item"><span>课时</span><strong>${s.duration || "45分钟"}</strong></div>
            </div>
          </div>
        `;
      } else {
        canvas.className = "slide-canvas content-theme";
        let bulletsHtml = '';
        if (s.bullets && s.bullets.length) {
          bulletsHtml = `<div class="slide-canvas-bullets">` + 
            s.bullets.map(b => `<div class="slide-canvas-bullet"><i></i><span>${b}</span></div>`).join('') + 
            `</div>`;
        }
        inner.innerHTML = `
          <span class="slide-canvas-kicker">${s.type}</span>
          <h2>${s.title}</h2>
          ${s.content ? `<p class="slide-desc">${s.content}</p>` : ''}
          ${bulletsHtml}
        `;
      }
    }

    function renderContext() {
      const s = slides[selectedIndex];
      document.getElementById('ai-scope').textContent = `当前页 · 第 ${selectedIndex + 1} 页`;
      document.getElementById('ctx-slide').textContent = `第 ${selectedIndex + 1} 页 · ${s.title}`;
      document.getElementById('ctx-element').textContent = '未选择，默认作用当前页';
      document.getElementById('ctx-desc').textContent = '没有选中具体元素时，AI 默认作用于当前页。';
    }

    function renderMessages() {
      const el = document.getElementById('ai-messages');
      if (!aiMessages.length) {
        el.innerHTML = `
          <div class="ai-empty">
            <div class="ai-empty-icon">✦</div>
            <strong>告诉 AI 你想怎么改</strong>
            <p>比如"把这一页讲得更通俗""加一页课堂互动""换成更清爽的主题"。</p>
            <div class="ai-empty-chips">
              <button onclick="quickPrompt('把当前页讲得更通俗一点，并补一句教师讲解词')">讲得更通俗</button>
              <button onclick="quickPrompt('给当前课件加一页课堂互动问题')">加互动问题</button>
              <button onclick="quickPrompt('把这份 PPT 调整成更适合公开课展示的风格')">公开课风格</button>
            </div>
          </div>
        `;
        return;
      }
      el.innerHTML = aiMessages.slice(-6).map(m => `
        <article class="ai-msg ${m.role}">
          <p>${m.text}</p>
        </article>
      `).join('');
      el.scrollTop = el.scrollHeight;
    }

    function selectSlide(i) {
      selectedIndex = i;
      renderSlideList();
      renderCanvas();
      renderContext();
    }

    function prevSlide() { if (selectedIndex > 0) selectSlide(selectedIndex - 1); }
    function nextSlide() { if (selectedIndex < slides.length - 1) selectSlide(selectedIndex + 1); }

    function deleteSlide() {
      if (slides.length <= 1) return;
      slides.splice(selectedIndex, 1);
      if (selectedIndex >= slides.length) selectedIndex = slides.length - 1;
      renderSlideList(); renderCanvas(); renderContext();
    }

    function duplicateSlide() {
      const s = JSON.parse(JSON.stringify(slides[selectedIndex]));
      s.id = s.id + '-copy-' + Date.now();
      s.title = s.title + '（副本）';
      slides.splice(selectedIndex + 1, 0, s);
      selectedIndex = selectedIndex + 1;
      renderSlideList(); renderCanvas(); renderContext();
    }

    function quickPrompt(text) {
      document.getElementById('ai-input').value = text;
      sendAiMessage();
    }

    function sendAiMessage() {
      const input = document.getElementById('ai-input');
      const text = input.value.trim();
      if (!text) return;
      aiMessages.push({ role: 'user', text });
      input.value = '';
      document.getElementById('ai-char-count').textContent = 'Enter 发送';
      renderMessages();
      // Simulate AI response
      setTimeout(() => {
        const s = slides[selectedIndex];
        aiMessages.push({
          role: 'assistant',
          text: `好的，我已收到你对"${s.title}"的修改意见："${text}"。由于这是纯前端演示，实际修改需要连接后端 AI 服务。你可以继续描述你想做的调整。`
        });
        renderMessages();
      }, 800);
    }

    document.getElementById('ai-form').addEventListener('submit', e => {
      e.preventDefault();
      sendAiMessage();
    });

    document.getElementById('ai-input').addEventListener('input', function() {
      const len = this.value.trim().length;
      document.getElementById('ai-char-count').textContent = len ? `${len} 字` : 'Enter 发送';
    });

    // Resizable AI Panel
    const editorBody = document.querySelector('.editor-body');
    const resizeHandle = document.getElementById('resize-handle');

    if (resizeHandle && editorBody) {
      let isDragging = false;

      resizeHandle.addEventListener('mousedown', (e) => {
        isDragging = true;
        resizeHandle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const containerRect = editorBody.getBoundingClientRect();
        // 计算鼠标到容器右边缘的距离，即为新的 AI 面板宽度
        const newWidth = containerRect.right - e.clientX;
        // 限制宽度在 260px 到 600px 之间
        const clampedWidth = Math.max(260, Math.min(600, newWidth));
        editorBody.style.gridTemplateColumns = `248px 1fr 4px ${clampedWidth}px`;
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          resizeHandle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }

    // Init
    renderSlideList();
    renderCanvas();
    renderContext();
    renderMessages();
  </script>
</body>
</html>
