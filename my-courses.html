<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的课程 - EduAI</title>
  <style>
    :root {
      --ink: #121615;
      --muted: #7b847d;
      --line: rgba(255, 255, 255, 0.74);
      --tile: rgba(253, 255, 251, 0.56);
      --panel: rgba(249, 252, 245, 0.58);
      --lime: #c4ff38;
      --green: #17663a;
      --dark: #252928;
      --shadow: 0 22px 52px rgba(43, 58, 45, 0.13);
      --soft-shadow: 0 16px 34px rgba(43, 58, 45, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --page-max: 1520px;
      --sidebar-left: 22px;
      --sidebar-width: 82px;
      --sidebar-top: 292px;
      --sidebar-height: 392px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background:
        radial-gradient(circle at 8% 50%, rgba(205, 255, 72, 0.26), transparent 20%),
        radial-gradient(circle at 66% 14%, rgba(177, 196, 176, 0.28), transparent 30%),
        radial-gradient(circle at 86% 92%, rgba(167, 188, 167, 0.22), transparent 24%),
        linear-gradient(108deg, #f7f9ef 0%, #edf4e7 44%, #e1eadc 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
      opacity: 0.35;
    }

    .shell {
      margin: 20px 40px 20px 260px;
      width: auto;
      height: min(960px, calc(100vh - 40px));
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .brand span {
      padding-left: 18px;
      border-left: 1px solid rgba(18, 22, 21, 0.12);
      color: #707872;
      font-size: 14px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .search {
      width: 292px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      color: #99a099;
      font-size: 14px;
    }

    .round-btn {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .headline-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.08;
      letter-spacing: -0.7px;
      font-weight: 950;
    }

    .hello {
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pill {
      height: 54px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.5);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.82);
      font-size: 14px;
      font-weight: 900;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .pill.lime {
      background: var(--lime);
      border-color: transparent;
      box-shadow: 0 18px 36px rgba(188, 255, 52, 0.28);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(360px, 0.7fr);
      gap: 28px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .left-col,
    .right-col {
      min-height: 0;
    }

    .side-nav {
      top: 20px;
      bottom: 20px;
      left: 20px;
      height: calc(100vh - 40px);
      position: fixed;
      width: 76px;
      padding: 20px 8px;
      background: rgba(253, 255, 251, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 20px 48px rgba(43, 64, 42, 0.08);
      border-radius: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .side-nav:hover {
      width: 220px;
      padding: 20px 16px;
    }

    .side-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px;
      margin-bottom: 24px;
      width: 100%;
    }

    .side-main {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #111416;
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .side-main:hover {
      background: #2a2d2c;
    }

    .side-brand-text {
      color: #111416;
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .side-nav:hover .side-brand-text {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .side-icons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      flex: 1 1 auto;
    }

    .side-item {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      color: #475569;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      width: 100%;
      white-space: nowrap;
    }

    .side-item svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.2;
      color: #475569;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .side-item span {
      font-size: 14px;
      font-weight: 800;
      color: #475569;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .side-nav:hover .side-item span {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .side-item:hover {
      background: rgba(255, 255, 255, 0.6);
      color: #111416;
    }

    .side-item:hover svg,
    .side-item:hover span {
      color: #111416;
    }

    .side-item.active {
      background: #111416;
      color: #fff;
    }

    .side-item.active svg,
    .side-item.active span {
      color: #fff;
    }

    .side-divider {
      width: calc(100% - 16px);
      margin: 8px auto;
      height: 1px;
      background: rgba(17, 20, 22, 0.08);
      flex-shrink: 0;
    }

    .side-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px;
      width: 100%;
      flex-shrink: 0;
    }

    .avatar-mini {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #d7ff5e;
      border: 2px solid #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 950;
      color: #111416;
      box-shadow: 0 8px 20px rgba(53, 84, 36, 0.12);
      position: relative;
      flex-shrink: 0;
    }

    .avatar-mini::after {
      content: "";
      position: absolute;
      right: -2px;
      top: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: #1c6742;
    }

    .side-user-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .side-nav:hover .side-user-info {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .side-user-name {
      font-size: 14px;
      font-weight: 900;
      color: #111416;
    }

    .side-user-role {
      font-size: 11px;
      font-weight: 700;
      color: #68716a;
    }

    svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.7;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .side-main .grid-icon {
      width: 22px;
      height: 22px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }

    .side-main .grid-icon i {
      border: 2.4px solid currentColor;
      border-radius: 2px;
    }

    .pill:hover {
      transform: translateY(-3px);
      filter: brightness(1.02);
      box-shadow: 0 22px 42px rgba(45, 59, 46, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    @media (prefers-reduced-motion: reduce) {
      .pill,
      .side-nav,
      .side-item {
        transition: none;
      }
    }

    @media (max-width: 1280px) {
      body {
        overflow: auto;
      }

      .shell {
        width: auto;
        height: auto;
        margin: 18px 18px 24px 260px;
      }

      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .shell {
        margin: 14px;
        width: auto;
        height: auto;
      }

      .side-nav {
        display: none;
      }

      .topbar,
      .top-actions,
      .headline-row {
        display: flex;
        flex-wrap: wrap;
        height: auto;
      }

      .brand {
        width: 100%;
      }

      .search {
        width: calc(100vw - 28px);
      }
    }
    /* ==================== Task 2 New Styles ==================== */
    .filter-capsule {
      display: flex;
      gap: 6px;
      background: rgba(255, 255, 255, 0.45);
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      box-shadow: var(--soft-shadow);
    }
    .filter-tab {
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: #68716a;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-tab.active {
      background: #111416;
      color: #fff;
      box-shadow: 0 8px 18px rgba(17, 20, 22, 0.15);
    }
    .filter-tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.6);
      color: #111416;
    }

    .courses-card {
      padding: 28px 30px 26px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 520px;
    }
    .courses-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: 21px;
      font-weight: 950;
      color: var(--ink);
    }
    .count-badge {
      font-size: 21px;
      font-weight: 950;
      color: var(--ink);
    }
    .course-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .course-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .course-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(43, 58, 45, 0.08);
      background: rgba(255, 255, 255, 0.8);
    }
    .course-item.active {
      background: #ffffff;
      border-left: 4.5px solid #1c6742;
      border-top-left-radius: 6px;
      border-bottom-left-radius: 6px;
      border-top-right-radius: 18px;
      border-bottom-right-radius: 18px;
      box-shadow: var(--soft-shadow);
    }
    .course-item-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .beaker-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #eafecf;
      color: #17663a;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .beaker-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
    }
    .course-item-details h4 {
      margin: 0;
      font-size: 16px;
      font-weight: 950;
      color: #111416;
    }
    .course-item-details p {
      margin: 4px 0 0;
      font-size: 12px;
      font-weight: 700;
      color: #7b847d;
    }
    .course-item-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      color: #7b847d;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #99a099;
      display: inline-block;
    }
    .details-panel {
      padding: 32px 30px 24px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .status-tag {
      background: #eafecf;
      color: #17663a;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 950;
      display: inline-block;
      width: max-content;
      margin-bottom: 16px;
    }
    .details-panel h2 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 950;
      color: #111416;
    }
    .details-sub {
      margin: 0 0 24px;
      font-size: 13px;
      font-weight: 700;
      color: #7b847d;
    }
    .details-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      flex-grow: 1;
    }
    .details-row {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }
    .row-label {
      color: #68716a;
      font-weight: 800;
    }
    .row-value {
      color: #121615;
      font-weight: 950;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70%;
    }
    .action-btn {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 52px;
      border-radius: 16px;
      border: none;
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .action-btn.primary {
      background: var(--lime);
      color: #0d120e;
      box-shadow: 0 16px 32px rgba(167, 255, 32, 0.24);
    }
    .action-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 40px rgba(175, 255, 36, 0.34);
      filter: brightness(1.02);
    }
  </style>
</head>
<body>
  <aside class="side-nav" aria-label="侧边导航">
    <div class="side-header">
      <div class="side-main" onclick="location.href='eduai-workbench.html'">
        <div class="grid-icon"><i></i><i></i><i></i><i></i></div>
      </div>
      <span class="side-brand-text">EduAI</span>
    </div>
    <div class="side-icons">
      <div class="side-item active" onclick="location.href='my-courses.html'">
        <svg viewBox="0 0 24 24"><path d="m3 9 9-5 9 5-9 5-9-5Z"/><path d="m7 11.5v5l5 3 5-3v-5"/></svg>
        <span>我的课程</span>
      </div>
      <div class="side-item">
        <svg viewBox="0 0 24 24"><path d="M7 7h10M7 11h10M7 15h6"/><rect x="5" y="3" width="14" height="17" rx="2"/><path d="M3 7v14h14"/></svg>
        <span>文档资料</span>
      </div>
      <div class="side-item">

      <div class="side-divider"></div>
      <div class="side-item">

  <main class="shell">

    <section class="headline-row">

                </div>

          <div class="details-rows">

            <div class="details-row">
              <span class="row-label">备课时间</span>
              <span class="row-value">05/28 19:43</span>
            </div>
            <div class="details-row">
              <span class="row-label">教学目标</span>
