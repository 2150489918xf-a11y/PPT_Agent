<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT 全屏预览线框原型</title>
  <style>
    :root {
      --ink: #111;
      --muted: #555;
      --line: #c7c7c7;
      --heavy: #222;
      --bg: #efefef;
      --white: #fff;
      --panel: #f7f7f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      overflow: hidden;
    }

    button {
      font: inherit;
      color: inherit;
      background: var(--white);
      border: 1px solid var(--heavy);
      cursor: pointer;
    }

    .preview {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: var(--bg);
    }

    .slide {
      width: min(94vw, 1540px);
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 56px);
      border: 3px solid var(--heavy);
      background: var(--white);
      position: relative;
      overflow: hidden;
    }

    .slide-inner {
      position: absolute;
      inset: 54px;
      border: 1px solid var(--line);
    }

    .slide-title {
      position: absolute;
      left: 10%;
      top: 30%;
      display: grid;
      gap: 16px;
    }

    .slide-title h1 {
      margin: 0;
      font-size: 48px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .slide-title p {
      margin: 0;
      color: var(--muted);
      font-size: 22px;
    }

    .slide-title small {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .slide-diagram {
      position: absolute;
      right: 13%;
      top: 28%;
      width: 220px;
      height: 220px;
      border: 1px solid var(--line);
    }

    .diagram-line {
      position: absolute;
      left: 42px;
      top: 104px;
      width: 142px;
      height: 2px;
      background: var(--heavy);
      transform: rotate(44deg);
    }

    .diagram-line.second {
      left: 70px;
      top: 66px;
      width: 126px;
      transform: rotate(-132deg);
    }

    .diagram-dot {
      position: absolute;
      left: 96px;
      top: 82px;
      width: 34px;
      height: 34px;
      border: 3px solid var(--heavy);
      border-radius: 50%;
      background: var(--white);
    }

    .slide-footer-line {
      position: absolute;
      left: 10%;
      bottom: 12%;
      width: 24%;
      height: 1px;
      background: var(--line);
    }

    .page-mark {
      position: absolute;
      left: 28px;
      bottom: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .float-ball {
      position: fixed;
      right: 54px;
      top: 112px;
      width: 58px;
      height: 58px;
      border: 3px solid var(--heavy);
      border-radius: 50%;
      background: var(--white);
      display: grid;
      place-items: center;
      font-weight: 900;
      z-index: 10;
    }

    .question-panel {
      position: fixed;
      right: 54px;
      top: 184px;
      width: min(440px, calc(100vw - 108px));
      max-height: calc(100vh - 224px);
      border: 2px solid var(--heavy);
      background: var(--white);
      display: none;
      z-index: 9;
    }

    .question-panel.open {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .question-list {
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .question-card {
      min-height: 96px;
      border: 1px solid var(--line);
      background: var(--white);
      padding: 16px 14px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 76px;
      gap: 12px;
      align-items: center;
      align-content: center;
      text-align: left;
    }

    .select-circle {
      display: block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--heavy);
      border-radius: 50%;
      background: var(--white);
      position: relative;
      align-self: center;
    }

    .question-card.selected .select-circle::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--heavy);
    }

    .question-main {
      display: grid;
      gap: 8px;
      min-width: 0;
      align-self: center;
    }

    .question-main strong {
      font-size: 15px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .question-main p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .question-type {
      width: 72px;
      height: 26px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      align-self: center;
    }

    .panel-foot {
      padding: 12px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .panel-btn {
      height: 36px;
      background: var(--white);
      font-weight: 800;
    }

    .hint {
      position: fixed;
      right: 36px;
      top: 82px;
      color: var(--muted);
      font-size: 13px;
      z-index: 8;
    }

    @media (max-width: 960px) {
      .slide-title h1 {
        font-size: 34px;
      }

      .slide-diagram {
        width: 150px;
        height: 150px;
      }

      .question-panel {
        left: 28px;
        right: 28px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="preview">
    <article class="slide" aria-label="全屏 PPT 播放画面">
      <div class="slide-inner"></div>
      <section class="slide-title">
        <h1>牛顿第二定律</h1>
        <p>力与加速度的定量关系</p>
        <small>授课年级：高中<br />授课时长：45 分钟</small>
      </section>
      <div class="slide-diagram" aria-hidden="true">
        <span class="diagram-line"></span>
        <span class="diagram-line second"></span>
        <span class="diagram-dot"></span>
      </div>
      <span class="slide-footer-line"></span>
      <span class="page-mark">1 / 12</span>
    </article>

    <span class="hint">点击悬浮球选择课堂题目</span>
    <button class="float-ball" type="button" aria-expanded="true" aria-controls="questionPanel">题</button>

    <aside class="question-panel open" id="questionPanel" aria-label="题目选择面板">
      <header class="panel-head">
        <h2>课堂题目</h2>
        <span>已选 2 题</span>
      </header>
      <section class="question-list">
        <button class="question-card selected" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>1. 物体受到恒定合力时，加速度会怎样变化？</strong>
            <p>用于封面后的快速导入，检查学生对力和运动关系的前概念。</p>
          </span>
          <span class="question-type">选择题</span>
        </button>
        <button class="question-card" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>2. 如果质量加倍、合力不变，加速度如何变化？</strong>
            <p>用于引出 F=ma 中质量与加速度的反比关系。</p>
          </span>
          <span class="question-type">判断题</span>
        </button>
        <button class="question-card selected" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>3. 根据实验数据判断合力与加速度是否成正比。</strong>
            <p>适合放在实验探究页，学生根据表格进行归纳。</p>
          </span>
          <span class="question-type">分析题</span>
        </button>
        <button class="question-card" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>4. 小车实验中为什么要减小摩擦力？</strong>
            <p>用于追问实验条件控制，帮助学生理解理想化处理。</p>
          </span>
          <span class="question-type">问答题</span>
        </button>
        <button class="question-card" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>5. 同一物体在不同拉力下的运动图像如何比较？</strong>
            <p>用于连接图像分析和课堂板书。</p>
          </span>
          <span class="question-type">图像题</span>
        </button>
        <button class="question-card" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>6. 电梯启动时体重计示数变大的原因是什么？</strong>
            <p>适合课堂迁移应用，联系生活情境。</p>
          </span>
          <span class="question-type">应用题</span>
        </button>
        <button class="question-card" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>7. 已知合力和质量，计算物体加速度。</strong>
            <p>用于公式应用练习，放在课堂检测页。</p>
          </span>
          <span class="question-type">计算题</span>
        </button>
        <button class="question-card" type="button">
          <span class="select-circle"></span>
          <span class="question-main">
            <strong>8. 为什么力不是维持运动的原因？</strong>
            <p>用于区分牛顿第一定律和第二定律的核心概念。</p>
          </span>
          <span class="question-type">辨析题</span>
        </button>
      </section>
      <footer class="panel-foot">
        <button class="panel-btn" type="button">取消</button>
        <button class="panel-btn" type="button">下发题目</button>
      </footer>
    </aside>
  </main>

  <script>
    const ball = document.querySelector(".float-ball");
    const panel = document.querySelector("#questionPanel");
    const selectedCount = document.querySelector(".panel-head span");

    ball.addEventListener("click", () => {
      panel.classList.toggle("open");
      ball.setAttribute("aria-expanded", panel.classList.contains("open"));
    });

    document.querySelectorAll(".question-card").forEach((card) => {
      card.addEventListener("click", () => {
        card.classList.toggle("selected");
        const count = document.querySelectorAll(".question-card.selected").length;
        selectedCount.textContent = `已选 ${count} 题`;
      });
    });
  </script>
</body>
</html>
