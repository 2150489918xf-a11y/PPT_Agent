<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>课程大纲工作台</title>
  <style>
    :root {
      --ink: #121615;
      --muted: #7b847d;
      --line: rgba(255, 255, 255, 0.74);
      --tile: rgba(253, 255, 251, 0.56);
      --panel: rgba(249, 252, 245, 0.58);
      --lime: #c4ff38;
      --green: #17663a;
      --dark: #252928;
      --shadow: 0 22px 52px rgba(43, 58, 45, 0.13);
      --soft-shadow: 0 16px 34px rgba(43, 58, 45, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --page-max: 1520px;
      
      /* Map original variables for compatibility */
      --bg-primary: #f7f9ef;
      --bg-secondary: rgba(255, 255, 255, 0.5);
      --bg-elevated: rgba(255, 255, 255, 0.85);
      --text-primary: #121615;
      --text-secondary: #475569;
      --text-muted: #7b847d;
      --border-default: rgba(255, 255, 255, 0.65);
      --border-hover: rgba(255, 255, 255, 0.9);
      --accent-primary: #17663a;
      --accent-hover: #0e3f24;
      --accent-glow: rgba(23, 102, 58, 0.12);
      --accent-green: #17663a;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      --text-xs: 12px; --text-sm: 14px; --text-base: 16px; --text-lg: 18px; --text-xl: 20px; --text-2xl: 24px;
      --font-medium: 500; --font-semibold: 600; --font-bold: 700;
      --leading-tight: 1.25; --leading-normal: 1.5; --leading-relaxed: 1.625;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-8: 32px;
      --radius-md: 8px; --radius-lg: 12px; --radius-full: 9999px;
      --shadow-sm: 0 4px 10px rgba(43, 58, 45, 0.04);
      --shadow-md: 0 12px 28px rgba(43, 58, 45, 0.08);
      --duration-fast: 150ms; --duration-normal: 200ms;
      --ease-default: cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      color: var(--text-primary);
      background:
        radial-gradient(circle at 8% 50%, rgba(205, 255, 72, 0.26), transparent 20%),
        radial-gradient(circle at 66% 14%, rgba(177, 196, 176, 0.28), transparent 30%),
        radial-gradient(circle at 86% 92%, rgba(167, 188, 167, 0.22), transparent 24%),
        linear-gradient(108deg, #f7f9ef 0%, #edf4e7 44%, #e1eadc 100%);
      font-family: var(--font-family);
      line-height: var(--leading-normal);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
      opacity: 0.35;
      z-index: 0;
    }
    button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    textarea { font: inherit; border: 0; background: none; color: inherit; resize: none; }
    input { font: inherit; border: 0; background: none; color: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

    /* Layout */
    .app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; overflow: hidden; position: relative; z-index: 1; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .topbar-left, .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-back {
      display: inline-flex; align-items: center; gap: 6px;
      height: 34px; padding: 0 12px; border-radius: var(--radius-full);
      border: 1px solid rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.5);
      color: #475569; font-size: var(--text-xs); font-weight: var(--font-bold);
      transition: all var(--duration-fast) var(--ease-default);
    }
    .topbar-back:hover { background: rgba(255, 255, 255, 0.85); }
    .topbar-title { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .topbar-title strong { font-size: 14px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-title span { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
    .btn {
      height: 34px; padding: 0 14px; border-radius: var(--radius-full);
      border: 1px solid rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.5);
      color: #475569; font-size: var(--text-xs); font-weight: var(--font-bold);
      transition: all var(--duration-fast) var(--ease-default);
    }
    .btn:hover { background: rgba(255, 255, 255, 0.85); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent-primary); border-color: transparent; color: #fff; box-shadow: 0 8px 18px var(--accent-glow); }
    .btn-primary:hover { background: var(--accent-hover); }

    /* Body */
    .shell {
      display: grid; grid-template-columns: 56px 1fr 4px 340px;
      min-height: 0; overflow: hidden;
    }

    /* Resize Handle */
    .resize-handle {
      width: 4px;
      cursor: col-resize;
      position: relative;
      z-index: 10;
      background: transparent;
      transition: background 0.2s;
    }
    .resize-handle:hover, .resize-handle.active {
      background: rgba(23, 102, 58, 0.2);
    }

    /* Left: Module Dock */
    .dock {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 16px 0; border-right: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(249, 252, 245, 0.58); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .dock-btn {
      width: 40px; height: 40px; border-radius: var(--radius-md);
      display: grid; place-items: center; color: #475569;
      position: relative; transition: all var(--duration-fast) var(--ease-default);
    }
    .dock-btn:hover { background: rgba(255, 255, 255, 0.65); color: var(--text-primary); }
    .dock-btn.active { background: #111416; color: #fff; box-shadow: 0 8px 18px rgba(17, 20, 22, 0.15); }
    .dock-btn svg { width: 18px; height: 18px; }
    .dock-sep { width: 24px; height: 1px; background: var(--border-default); margin: 4px 0; }
    .dock-btn[disabled] { opacity: 0.3; cursor: not-allowed; }
    .dock-btn .badge {
      position: absolute; top: 4px; right: 4px; width: 8px; height: 8px;
      border-radius: var(--radius-full); background: var(--accent-green);
    }

    /* Center: Main Panel */
    .main-panel {
      min-width: 0; overflow-y: auto; padding: 24px 32px;
      background: transparent;
    }

    /* Overview Hero */
    .overview-hero {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      padding: 24px; border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-md); margin-bottom: 24px;
    }
    .overview-hero-copy { display: grid; gap: 8px; min-width: 0; }
    .overview-hero-copy .kicker { color: #17663a; font-size: var(--text-xs); font-weight: var(--font-bold); }
    .overview-hero-copy h2 { font-size: var(--text-2xl); font-weight: 800; line-height: var(--leading-tight); }
    .overview-hero-copy p { color: var(--text-secondary); font-size: var(--text-sm); line-height: var(--leading-relaxed); max-width: 600px; }
    .overview-metrics { display: flex; gap: 16px; margin-top: 8px; }
    .overview-metrics strong {
      font-size: var(--text-sm); font-weight: 700; color: var(--text-primary);
      padding: 4px 12px; border: 1px solid var(--border-default); border-radius: var(--radius-full);
      background: var(--bg-elevated);
    }
    .overview-hero .btn-generate {
      flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
      height: 40px; padding: 0 18px; border-radius: var(--radius-full);
      background: var(--lime); color: #0d120e; border: none; box-shadow: 0 10px 20px rgba(188, 255, 52, 0.22); font-weight: 950;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .overview-hero .btn-generate:hover { transform: translateY(-2px); filter: brightness(1.02); box-shadow: 0 14px 28px rgba(188, 255, 52, 0.32); }
    .overview-hero .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Blueprint Document */
    .blueprint-doc {
      border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-md); padding: 24px 28px; margin-bottom: 24px;
    }
    .blueprint-doc h1 { font-size: var(--text-xl); font-weight: 800; margin-bottom: 12px; }
    .blueprint-meta { display: flex; gap: 16px; margin-bottom: 20px; }
    .blueprint-meta span { color: var(--text-muted); font-size: var(--text-xs); }
    .blueprint-doc h2 { font-size: var(--text-base); font-weight: 700; margin: 20px 0 12px; color: var(--text-primary); }
    .blueprint-doc h3 { font-size: var(--text-sm); font-weight: 700; margin: 16px 0 8px; color: var(--text-secondary); }
    .blueprint-doc ul { padding-left: 20px; display: grid; gap: 6px; }
    .blueprint-doc li { font-size: var(--text-sm); color: var(--text-secondary); line-height: var(--leading-relaxed); }
    .blueprint-doc li::marker { color: var(--accent-primary); }

    /* Empty Requirements */
    .requirements-empty { display: grid; gap: 12px; margin-bottom: 24px; }
    .req-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.7); border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.6);
    }
    .req-item.ready { border-color: #17663a; }
    .req-icon {
      width: 28px; height: 28px; border-radius: var(--radius-full);
      display: grid; place-items: center; font-size: 14px;
      background: var(--bg-elevated); color: var(--text-muted);
    }
    .req-item.ready .req-icon { background: rgba(23, 102, 58, 0.12); color: #17663a; }
    .req-item strong { font-size: var(--text-sm); font-weight: 700; }
    .req-item p { margin: 0; color: var(--text-muted); font-size: var(--text-xs); }

    /* Mode Workbench */
    .mode-workbench {
      border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-md); padding: 24px; margin-bottom: 24px;
    }
    .mode-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
    .mode-icon {
      width: 44px; height: 44px; border-radius: var(--radius-md); flex-shrink: 0;
      display: grid; place-items: center; font-size: 20px;
      background: var(--accent-glow); color: var(--accent-primary);
    }
    .mode-head .kicker { color: #17663a; font-size: var(--text-xs); font-weight: var(--font-bold); }
    .mode-head h3 { font-size: var(--text-lg); font-weight: 800; margin: 2px 0 4px; }
    .mode-head p { color: var(--text-muted); font-size: var(--text-sm); }
    .mode-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .mode-action-card {
      padding: 14px; border: 1px solid rgba(255, 255, 255, 0.7); border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.6); text-align: left; display: grid; gap: 6px;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .mode-action-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .mode-action-card:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .mode-action-card strong { font-size: var(--text-sm); font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .mode-action-card small { color: var(--text-muted); font-size: var(--text-xs); }
    .mode-prompts { display: flex; flex-wrap: wrap; gap: 8px; }
    .mode-prompts button {
      height: 30px; padding: 0 12px; border-radius: var(--radius-full);
      border: 1px solid var(--border-default); background: var(--bg-secondary);
      color: var(--text-muted); font-size: var(--text-xs);
    }
    .mode-prompts button:hover { border-color: var(--accent-primary); color: var(--text-primary); }

    /* Right: AI Panel */
    .ai-panel {
      display: grid; grid-template-rows: 1fr auto;
      border-left: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(249, 252, 245, 0.58); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .ai-messages {
      display: grid; align-content: start; gap: 16px;
      overflow-y: auto; padding: 18px;
    }
    .ai-msg {
      display: grid; justify-self: start; max-width: 88%;
      padding: 14px 20px; border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px; background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(43, 58, 45, 0.05);
    }
    .ai-msg.user {
      justify-self: end;
      border-radius: 20px;
      background: rgba(17, 20, 22, 0.82);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 28px rgba(17, 20, 22, 0.18);
    }
    .ai-msg.user p { color: #ffffff; }
    .ai-msg p { margin: 0; color: #2c332e; font-size: 14px; line-height: 1.6; overflow-wrap: anywhere; }
    .ai-msg-loading {
      display: flex; gap: 4px; padding: 14px;
    }
    .ai-msg-loading span {
      width: 6px; height: 6px; border-radius: var(--radius-full); background: var(--text-muted);
      animation: loadDot 1.2s infinite;
    }
    .ai-msg-loading span:nth-child(2) { animation-delay: 0.2s; }
    .ai-msg-loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadDot { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    .ai-composer {
      display: grid; gap: 10px; padding: 14px 18px 18px;
      border-top: 1px solid var(--border-default);
    }
    .ai-composer textarea {
      min-height: 80px; max-height: 120px; padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.85); border-radius: 20px;
      background: rgba(255, 255, 255, 0.5); color: #121615;
      font-size: 13.5px; line-height: 1.6;
    }
    .ai-composer textarea:focus { border-color: var(--accent-primary); outline: none; }
    .ai-composer-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .ai-composer-actions span { margin-right: auto; color: var(--text-muted); font-size: 12px; }
    .ai-composer-actions .btn-clear {
      height: 28px; padding: 0 10px; border-radius: var(--radius-full);
      border: 1px solid rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.5);
      color: #475569; font-size: 11px;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .ai-composer-actions .btn-clear:hover { background: rgba(255, 255, 255, 0.85); }
    .ai-composer-actions .btn-send {
      height: 34px; padding: 0 14px; border-radius: var(--radius-full);
      background: var(--lime); color: #0d120e; border: none; box-shadow: 0 10px 20px rgba(188, 255, 52, 0.22); font-weight: 950;
      font-size: 12px;
      transition: all var(--duration-fast) var(--ease-default);
    }
    .ai-composer-actions .btn-send:hover { transform: translateY(-2px); filter: brightness(1.02); box-shadow: 0 14px 28px rgba(188, 255, 52, 0.32); }
    .ai-composer-actions .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Far Right: Info Panel */
    .info-panel {
      display: grid; align-content: start; gap: 16px;
      padding: 16px; border-left: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(249, 252, 245, 0.58); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      overflow-y: auto;
    }
    .info-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: var(--text-xs); font-weight: var(--font-bold);
    }
    .info-status i { width: 7px; height: 7px; border-radius: var(--radius-full); }
    .info-status.ready i { background: var(--accent-green); }
    .info-status.pending i { background: var(--accent-yellow); }
    .info-status.empty i { background: var(--text-muted); }
    .info-section { display: grid; gap: 8px; }
    .info-section > span { color: var(--text-muted); font-size: var(--text-xs); font-weight: var(--font-bold); }
    .info-section h2 { font-size: var(--text-sm); font-weight: 800; }
    .info-section p { margin: 0; color: var(--text-muted); font-size: var(--text-xs); line-height: var(--leading-relaxed); }
    .info-course {
      padding: 12px; border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-md);
    }
    .info-course span { color: var(--text-muted); font-size: var(--text-xs); display: block; margin-bottom: 6px; }
    .info-course strong { font-size: var(--text-sm); display: block; }
    .info-course p { margin: 4px 0 0; color: var(--text-muted); font-size: var(--text-xs); }
    .info-fields { display: grid; gap: 6px; }
    .info-field { display: flex; justify-content: space-between; align-items: center; }
    .info-field span { color: var(--text-muted); font-size: var(--text-xs); }
    .info-field strong { font-size: var(--text-xs); font-weight: 700; }
    .blueprint-card {
      padding: 14px; border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-md);
    }
    .blueprint-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .blueprint-card-head span { color: var(--text-muted); font-size: var(--text-xs); }
    .blueprint-card-head strong { font-size: var(--text-xs); font-weight: 700; }
    .blueprint-card h3 { font-size: var(--text-sm); font-weight: 700; margin-bottom: 8px; }
    .blueprint-steps { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .blueprint-steps span {
      height: 22px; padding: 0 8px; border-radius: var(--radius-full);
      border: 1px solid var(--border-default); background: var(--bg-elevated);
      color: var(--text-muted); font-size: 10px; display: inline-flex; align-items: center;
    }
    .info-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; height: 38px; border-radius: var(--radius-full);
      background: var(--lime); color: #0d120e; border: none; box-shadow: 0 10px 20px rgba(188, 255, 52, 0.22); font-weight: 950;
      font-size: var(--text-sm);
      transition: all var(--duration-fast) var(--ease-default);
    }
    .info-primary:hover { transform: translateY(-2px); filter: brightness(1.02); box-shadow: 0 14px 28px rgba(188, 255, 52, 0.32); }
    .info-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Tool Cards */
    .tool-cards { display: grid; gap: 10px; margin-bottom: 24px; }
    .tool-card {
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
      padding: 14px 16px; border: 1px solid rgba(255, 255, 255, 0.8); border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.5); box-shadow: var(--shadow-md); transition: all var(--duration-fast) var(--ease-default);
    }
    .tool-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .tool-card strong { font-size: var(--text-sm); font-weight: 700; }
    .tool-card p { margin: 2px 0 0; color: var(--text-muted); font-size: var(--text-xs); }
    .tool-card .tool-status {
      font-size: var(--text-xs); font-weight: var(--font-bold); white-space: nowrap;
      padding: 3px 10px; border-radius: var(--radius-full); border: 1px solid var(--border-default);
      background: var(--bg-elevated); color: var(--text-muted);
    }
    .tool-card .tool-status.done { border-color: var(--accent-green); color: var(--accent-green); background: rgba(23, 102, 58, 0.1); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-back" onclick="alert('返回我的课程')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          返回我的课程
        </button>
        <div class="topbar-title">
          <strong id="ws-title">牛顿第一定律</strong>
          <span id="ws-meta">八年级物理 · 45分钟 · 3 个知识点 · 5/5 项信息</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="alert('重新开始')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          重新开始
        </button>
      </div>
    </header>

    <div class="shell">
      <!-- Left: Module Dock -->
      <nav class="dock">
        <button class="dock-btn active" id="dock-overview" onclick="selectModule('overview')" title="课程大纲">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m8 8 4-4 4 4"/><path d="M8 16l4 4 4-4"/></svg>
        </button>
        <div class="dock-sep"></div>
        <button class="dock-btn" id="dock-ppt" onclick="selectModule('ppt')" title="PPT 课件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
          <span class="badge"></span>
        </button>
        <button class="dock-btn" id="dock-lesson-plan" onclick="selectModule('lesson-plan')" title="教案">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
        </button>
        <button class="dock-btn" id="dock-quiz" onclick="selectModule('quiz')" title="练习题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a3 3 0 1 1 4.9 2.3c-.8.6-1.4 1.1-1.4 2.2"/><path d="M12 17h.01"/></svg>
        </button>
        <button class="dock-btn" id="dock-resources" onclick="selectModule('resources')" title="教学资源">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </button>
      </nav>

      <!-- Center: Main Panel -->
      <main class="main-panel" id="main-panel"></main>

      <!-- Resize Handle -->
      <div class="resize-handle" id="resize-handle"></div>

      <!-- Right: AI Panel -->
      <aside class="ai-panel">
        <section class="ai-messages" id="ai-messages"></section>
        <form class="ai-composer" id="ai-form">
          <textarea id="ai-input" rows="3" placeholder="输入你想让 AI 调整、补充或继续生成的内容" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <div class="ai-composer-actions">
            <span id="ai-char">Enter 发送</span>
            <button class="btn-clear" type="button" onclick="document.getElementById('ai-input').value='';updateChar();">清空</button>
            <button class="btn-send" type="submit">发送</button>
          </div>
        </form>
      </aside>

      <!-- Far Right: Info Panel -->
    </div>
  </div>

  <script>
    // State
    let currentModule = 'overview';
    const fields = {
      subject: '牛顿第一定律', grade: '八年级物理', duration: '45 分钟',
      goals: '理解惯性概念，掌握力与运动的关系',
      keyPoints: ['惯性', '力与运动关系', '牛顿第一定律']
    };
    const blueprint = {
      title: '牛顿第一定律课程大纲', status: 'confirmed',
      steps: [
        { phase: '导入', title: '公交急刹案例引入', time: 5, intent: '激发学生对惯性现象的好奇', keyContent: ['公交车急刹身体前倾', '提出问题：为什么？'], teacherMove: '播放视频，引导讨论', expectedOutput: '学生能描述现象并尝试解释' },
        { phase: '建构', title: '惯性概念讲解', time: 12, intent: '建立惯性的科学概念', keyContent: ['惯性定义', '一切物体都有惯性', '质量是惯性大小的量度'], teacherMove: '类比讲解，板书关键公式', expectedOutput: '能用自己的话解释惯性' },
        { phase: '探究', title: '生活中的惯性实验', time: 10, intent: '通过实验加深理解', keyContent: ['纸片硬币实验', '叠棋子实验'], teacherMove: '演示实验，引导观察', expectedOutput: '能用惯性解释实验现象' },
        { phase: '应用', title: '课堂互动练习', time: 10, intent: '巩固所学知识', keyContent: ['选择题3道', '判断题2道'], teacherMove: '巡视指导，收集错误', expectedOutput: '正确率80%以上' },
        { phase: '总结', title: '归纳力与运动关系', time: 8, intent: '建立完整知识框架', keyContent: ['力是改变运动状态的原因', '惯性是物体固有属性'], teacherMove: '引导学生自主总结', expectedOutput: '能区分惯性和力的概念' }
      ]
    };
    const aiMessages = [];
    const moduleData = {
      overview: { title: '课程大纲', icon: 'account_tree', description: '整理这节课的课堂流程、教学意图和关键内容。' },
      ppt: { title: 'PPT 课件', icon: 'slideshow', description: '基于课程大纲生成可编辑的课件草稿。', hasContent: true },
      'lesson-plan': { title: '教案设计', icon: 'article', description: '把教学目标、环节和教师提示整理成教案。', hasContent: false },
      quiz: { title: '课堂练习', icon: 'quiz', description: '围绕当前知识点出课堂小测。', hasContent: false },
      resources: { title: '教学资源', icon: 'library_books', description: '检索和管理这节课可用的教学素材。', hasContent: false }
    };

    function selectModule(id) {
      currentModule = id;
      document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('dock-' + id)?.classList.add('active');
      renderMain();
      renderInfo();
      renderAiMessages();
    }

    function renderMain() {
      const panel = document.getElementById('main-panel');
      if (currentModule === 'overview') {
        renderOverview(panel);
      } else {
        renderModeWorkbench(panel);
      }
    }

    function renderOverview(panel) {
      const statusLabel = '已确认';
      const metrics = `<div class="overview-metrics">
        <strong>${blueprint.steps.length} 个课堂环节</strong>
        <strong>${fields.duration}</strong>
        <strong>${fields.keyPoints.length} 个知识点</strong>
      </div>`;
      const stepsHtml = blueprint.steps.map((s, i) => `
        <h3>${i + 1}. ${s.phase}：${s.title}</h3>
        <ul>
          <li>时间：${s.time} 分钟</li>
          <li>教学意图：${s.intent}</li>
          <li>关键内容：<ul>${s.keyContent.map(c => `<li>${c}</li>`).join('')}</ul></li>
          <li>教师动作：${s.teacherMove}</li>
          <li>学生产出：${s.expectedOutput}</li>
        </ul>
      `).join('');

      panel.innerHTML = `
        <section class="overview-hero">
          <div class="overview-hero-copy">
            <span class="kicker">${statusLabel} · 课程大纲</span>
            <h2>${blueprint.title}</h2>
            <p>按 导入 / 建构 / 探究 / 应用 / 总结 组织课堂推进，下面的大纲会明确每个环节的教学意图、关键内容、教师动作和学生产出。</p>
            ${metrics}
          </div>
          <button class="btn-generate" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m8 8 4-4 4 4"/><path d="M8 16l4 4 4-4"/></svg>
            大纲已确认
          </button>
        </section>
        <section class="blueprint-doc">
          <h1>${blueprint.title}</h1>
          <div class="blueprint-meta">
            <span>年级：${fields.grade}</span>
            <span>课时：${fields.duration}</span>
            <span>状态：已确认</span>
          </div>
          <h2>课堂流程</h2>
          ${stepsHtml}
          <h2>练习与评价</h2>
          <ul>
            <li>1. 选择题：惯性概念理解（检测基本概念掌握）</li>
            <li>2. 判断题：力与运动关系辨析（纠正常见误区）</li>
            <li>3. 填空题：牛顿第一定律表述（检查核心知识点记忆）</li>
          </ul>
        </section>
      `;
    }

    function renderModeWorkbench(panel) {
      const mod = moduleData[currentModule];
      const actions = getModuleActions();
      const prompts = getModulePrompts();
      panel.innerHTML = `
        <section class="mode-workbench">
          <header class="mode-head">
            <span class="mode-icon">${getIcon(mod.icon)}</span>
            <div>
              <span class="kicker">${mod.hasContent ? '已生成' : '待生成'}</span>
              <h3>${mod.title}</h3>
              <p>${mod.description}</p>
            </div>
          </header>
          <div class="mode-actions">
            ${actions.map(a => `
              <button class="mode-action-card" ${a.disabled ? 'disabled' : ''} onclick="${a.onclick}">
                <strong>${a.icon} ${a.label}</strong>
                <small>${a.description}</small>
              </button>
            `).join('')}
          </div>
          <div class="mode-prompts">
            ${prompts.map(p => `<button onclick="setInput('${p}')">${p}</button>`).join('')}
          </div>
        </section>
        ${renderToolCards()}
      `;
    }

    function getModuleActions() {
      switch (currentModule) {
        case 'ppt': return [
          { icon: '📊', label: '查看 PPT', description: '打开已生成的课件继续编辑。', onclick: "location.href='ppt-preview.html'", disabled: false },
          { icon: '🔄', label: '重新生成', description: '基于课程大纲重新生成课件。', onclick: "alert('重新生成')", disabled: false }
        ];
        case 'lesson-plan': return [
          { icon: '📝', label: '生成教案', description: '基于课程大纲生成教案草稿。', onclick: "alert('生成教案')", disabled: false },
          { icon: '📤', label: '导出 DOCX', description: '将教案导出为 Word 文档。', onclick: "alert('导出')", disabled: true }
        ];
        case 'quiz': return [
          { icon: '✏️', label: '生成练习题', description: '基于知识点出 3 道课堂小测。', onclick: "alert('生成练习')", disabled: false },
          { icon: '🔄', label: '重新出题', description: '更换题目类型或难度。', onclick: "alert('重新出题')", disabled: true }
        ];
        case 'resources': return [
          { icon: '🔍', label: '检索教学资源', description: '根据课程信息检索可用素材。', onclick: "alert('检索资源')", disabled: false },
          { icon: '📁', label: '上传资料', description: '上传自己的教学资料。', onclick: "alert('上传')", disabled: false }
        ];
        default: return [];
      }
    }

    function getModulePrompts() {
      switch (currentModule) {
        case 'ppt': return ['把第3页讲得更通俗', '加一页课堂互动', '换成公开课风格'];
        case 'lesson-plan': return ['补充教学反思建议', '增加分层作业设计', '加入学情分析'];
        case 'quiz': return ['增加一道应用题', '降低选择题难度', '加入解析过程'];
        case 'resources': return ['找一些动画素材', '推荐相关实验视频', '搜索同类课程教案'];
        default: return [];
      }
    }

    function renderToolCards() {
      const tools = [
        { label: 'PPT 课件', desc: '基于课程大纲生成可编辑课件', status: '已生成', done: true },
        { label: '教案设计', desc: '教学目标、流程和教师提示', status: '待生成', done: false },
        { label: '课堂练习', desc: '默认3题，覆盖核心知识点', status: '待生成', done: false }
      ];
      return `<div class="tool-cards">${tools.map(t => `
        <div class="tool-card">
          <div><strong>${t.label}</strong><p>${t.desc}</p></div>
          <span class="tool-status ${t.done ? 'done' : ''}">${t.status}</span>
        </div>
      `).join('')}</div>`;
    }

    function renderInfo() {
      const panel = document.getElementById('info-panel');
      if (!panel) return;
      const statusClass = 'ready';
      const statusText = '已确认';
      const mod = moduleData[currentModule];
      const courseInfo = [
        { label: '主题', value: fields.subject },
        { label: '年级', value: fields.grade },
        { label: '时长', value: fields.duration },
        { label: '目标', value: fields.goals },
        { label: '知识点', value: fields.keyPoints.join('、') }
      ];
      panel.innerHTML = `
        <div class="info-status ${statusClass}"><i></i> ${statusText}</div>
        <div class="info-section">
          <h2>${mod.title}</h2>
          <p>${mod.description}</p>
        </div>
        ${currentModule !== 'overview' ? `
        <div class="info-course">
          <span>课程上下文</span>
          <strong>${fields.subject}</strong>
          <p>${fields.grade} · ${fields.duration} · ${fields.keyPoints.length} 个知识点</p>
        </div>
        <div class="info-section">
          <span>课程信息</span>
          <div class="info-fields">
            ${courseInfo.map(f => `<div class="info-field"><span>${f.label}</span><strong>${f.value}</strong></div>`).join('')}
          </div>
        </div>
        ` : ''}
        <div class="blueprint-card">
          <div class="blueprint-card-head">
            <span>课程大纲</span>
            <strong>${statusText}</strong>
          </div>
          <h3>${blueprint.title}</h3>
          <div class="blueprint-steps">
            ${blueprint.steps.map(s => `<span>${s.phase}</span>`).join('')}
          </div>
          <p>课程大纲已确认，PPT、教案和练习题都会基于这份大纲生成。</p>
        </div>
        <button class="info-primary" onclick="alert('继续设计')">
          ${getIcon(mod.icon)}
          ${currentModule === 'overview' ? '大纲已确认' : '继续设计'}
        </button>
      `;
    }

    function renderAiMessages() {
      const el = document.getElementById('ai-messages');
      if (!aiMessages.length) {
        const tips = {
          overview: '先把这节课聊清楚',
          ppt: '围绕当前课件继续优化',
          'lesson-plan': '先把教案单独整理出来',
          quiz: '围绕当前知识点出题',
          resources: '补充可用素材'
        };
        el.innerHTML = `
          <div class="ai-msg assistant">
            <p>你好！我是 AI 教学助手。${tips[currentModule] || '有什么可以帮你的？'}</p>
          </div>
        `;
        return;
      }
      el.innerHTML = aiMessages.slice(-8).map(m => `
        <article class="ai-msg ${m.role}"><p>${m.text}</p></article>
      `).join('');
      el.scrollTop = el.scrollHeight;
    }

    function setInput(text) {
      document.getElementById('ai-input').value = text;
      document.getElementById('ai-input').focus();
      updateChar();
    }

    function updateChar() {
      const len = document.getElementById('ai-input').value.trim().length;
      document.getElementById('ai-char').textContent = len ? `${len} 字` : 'Enter 发送';
    }

    function sendMsg() {
      const input = document.getElementById('ai-input');
      const text = input.value.trim();
      if (!text) return;
      aiMessages.push({ role: 'user', text });
      input.value = '';
      updateChar();
      renderAiMessages();
      setTimeout(() => {
        const mod = moduleData[currentModule];
        aiMessages.push({
          role: 'assistant',
          text: `收到！关于"${mod.title}"的请求："${text}"。这是纯前端演示，实际修改需要连接后端 AI 服务。你可以继续描述你想做的调整。`
        });
        renderAiMessages();
      }, 800);
    }

    document.getElementById('ai-form').addEventListener('submit', e => { e.preventDefault(); sendMsg(); });
    document.getElementById('ai-input').addEventListener('input', updateChar);

    function getIcon(name) {
      const icons = {
        account_tree: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m8 8 4-4 4 4"/><path d="M8 16l4 4 4-4"/></svg>',
        slideshow: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>',
        article: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
        quiz: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a3 3 0 1 1 4.9 2.3c-.8.6-1.4 1.1-1.4 2.2"/><path d="M12 17h.01"/></svg>',
        library_books: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'
      };
      return icons[name] || '';
    }

    // Resizable AI Panel
    const shell = document.querySelector('.shell');
    const resizeHandle = document.getElementById('resize-handle');

    if (resizeHandle && shell) {
      let isDragging = false;

      resizeHandle.addEventListener('mousedown', (e) => {
        isDragging = true;
        resizeHandle.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const containerRect = shell.getBoundingClientRect();
        // 计算鼠标到容器右边缘的距离，即为新的 AI 面板宽度
        const newWidth = containerRect.right - e.clientX;
        // 限制宽度在 260px 到 600px 之间
        const clampedWidth = Math.max(260, Math.min(600, newWidth));
        shell.style.gridTemplateColumns = `56px 1fr 4px ${clampedWidth}px`;
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          resizeHandle.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }

    // Init
    renderMain();
    renderInfo();
    renderAiMessages();
  </script>
</body>
</html>
